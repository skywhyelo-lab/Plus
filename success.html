<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата получена | Pulse</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --accent-rgb: 34, 211, 238;
      --bg: #08080c;
      --bg-panel: #101019;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #9fa3b8;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 30px;
      text-align: center;
    }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { color: var(--text-muted); font-size: 14.5px; line-height: 1.5; margin: 0 0 24px; }
    .key-box {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(var(--accent-rgb), 0.35);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      word-break: break-all;
      display: none;
    }
    .copy-btn {
      display: none;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, rgb(var(--accent-rgb)), #3B82F6);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgb(var(--accent-rgb));
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: var(--red); display: none; }
    a.home { color: var(--text-muted); font-size: 13px; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Ждём подтверждения оплаты…</h1>
    <p id="subtitle">Обычно это занимает несколько секунд. Не закрывайте страницу.</p>
    <div class="key-box" id="keyBox"></div>
    <button class="copy-btn" id="copyBtn">Скопировать ключ</button>
    <p class="error" id="errorMsg">Не удалось получить статус заказа автоматически. Если оплата прошла, напишите нам в Telegram, пришлём ключ вручную: <a href="https://t.me/Pulse_buy" target="_blank" rel="noopener">t.me/Pulse_buy</a></p>
    <a class="home" href="/">На главную</a>
  </div>

  <script>
    const orderId = new URLSearchParams(location.search).get('order_id') || localStorage.getItem('pulse_order_id');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const spinner = document.getElementById('spinner');
    const keyBox = document.getElementById('keyBox');
    const copyBtn = document.getElementById('copyBtn');
    const errorMsg = document.getElementById('errorMsg');

    if (!orderId) {
      spinner.style.display = 'none';
      title.textContent = 'Заказ не найден';
      subtitle.style.display = 'none';
      errorMsg.style.display = 'block';
    } else {
      let attempts = 0;
      const maxAttempts = 30; // ~60s at 2s interval

      async function poll() {
        attempts++;
        try {
          const res = await fetch(`/api/order-status?order_id=${encodeURIComponent(orderId)}`);
          const data = await res.json();
          if (data.status === 'paid' && data.key) {
            spinner.style.display = 'none';
            title.textContent = 'Оплата прошла успешно!';
            subtitle.textContent = 'Ваш лицензионный ключ активации Pulse:';
            keyBox.textContent = data.key;
            keyBox.style.display = 'block';
            copyBtn.style.display = 'block';
            localStorage.removeItem('pulse_order_id');
            return;
          }
        } catch (e) {
          console.error(e);
        }
        if (attempts >= maxAttempts) {
          spinner.style.display = 'none';
          title.textContent = 'Оплата ещё обрабатывается';
          subtitle.style.display = 'none';
          errorMsg.style.display = 'block';
          return;
        }
        setTimeout(poll, 2000);
      }
      poll();
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(keyBox.textContent);
      copyBtn.textContent = 'Скопировано!';
      setTimeout(() => (copyBtn.textContent = 'Скопировать ключ'), 1500);
    });
  </script>
</body>
</html>
